<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-width:1080px;min-height:1920px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
.wrapper{width:1080px;height:1920px;position:relative;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 50px}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px}
.badge{position:absolute;top:60px;left:50px;background:#FCD228;color:#000;padding:12px 24px;font-size:28px;font-weight:bold;border-radius:4px}
.title{color:#fff;text-align:center;line-height:1.3;font-weight:bold;width:100%}
.subtitle{color:#888;text-align:center;font-size:36px;margin-top:40px;width:100%}
</style>
</head>
<body>
<div class="wrapper">
<div class="grid"></div>
{{#badge}}<div class="badge">{{badge}}</div>{{/badge}}
<h1 class="title" style="font-size:{{titleSize}}px">{{{title}}}</h1>
{{#subtitle}}<p class="subtitle">{{subtitle}}</p>{{/subtitle}}
</div>
</body>
</html>

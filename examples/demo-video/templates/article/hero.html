<div class="vep-hero-wrap">
{{#badge}}<div class="vep-badge vep-badge-hero">{{badge}}</div>{{/badge}}
<h1 class="vep-hero-title" style="font-size:{{titleSize}}px"><span class="vep-hero-logo" aria-hidden="true">{{{jsLogo}}}</span><span class="vep-hero-title-text">{{{title}}}</span></h1>
{{#highlightLine}}<p class="vep-hero-highlight"><span class="vep-highlight">{{highlightLine}}</span></p>{{/highlightLine}}
{{#stat}}<div class="vep-hero-stat">{{stat}}</div>{{/stat}}
{{#statLabel}}<div class="vep-hero-stat-label">{{statLabel}}</div>{{/statLabel}}
{{#subtitlePlain}}<p class="vep-hero-subtitle-plain">{{subtitlePlain}}</p>{{/subtitlePlain}}
</div>

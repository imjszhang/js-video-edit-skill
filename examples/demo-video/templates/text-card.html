<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-width:1080px;min-height:1920px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
.wrapper{width:1080px;height:1920px;position:relative;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 50px}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px}
.card{width:100%;padding:55px 50px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px}
.heading{color:#FCD228;font-size:56px;font-weight:bold;margin-bottom:40px;line-height:1.3}
.body{color:#fff;font-size:40px;line-height:1.6}
</style>
</head>
<body>
<div class="wrapper">
<div class="grid"></div>
<div class="card">
{{#heading}}<h2 class="heading">{{heading}}</h2>{{/heading}}
<div class="body">{{{body}}}</div>
</div>
</div>
</body>
</html>

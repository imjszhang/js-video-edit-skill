<div class="vep-hero-wrap">
<div class="vep-hero-meta">
<span class="vep-hero-logo" aria-hidden="true">{{{jsLogo}}}</span>
{{#badge}}<div class="vep-badge vep-badge-inline">{{badge}}</div>{{/badge}}
</div>
<h1 class="vep-hero-title" style="font-size:{{titleSize}}px">{{{title}}}</h1>
{{#highlightLine}}<p class="vep-hero-highlight"><span class="vep-highlight">{{highlightLine}}</span></p>{{/highlightLine}}
{{#stat}}<div class="vep-hero-stat-row"><span class="vep-hero-stat">{{stat}}</span>{{#statLabel}}<span class="vep-hero-stat-suffix"> · {{statLabel}}</span>{{/statLabel}}</div>{{/stat}}
{{#subtitlePlain}}<p class="vep-hero-subtitle-plain">{{subtitlePlain}}</p>{{/subtitlePlain}}
</div>
